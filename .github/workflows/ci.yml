name: Express API Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Tải code về máy runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Node.js và bật cơ chế cache npm tự động
      # (Giúp tăng tốc các lần chạy tiếp theo)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # Bước 3: Cài đặt thư viện sạch (sử dụng npm ci đọc từ package.json)
    - name: Install Dependencies
      run: npm ci

    # Bước 4: Kiểm tra chạy thử build docker xem Dockerfile viết có lỗi gì không
      # (Chỉ build thử để kiểm tra cú pháp, không push lên Registry)
    - name: Test Build Docker Image
      run: docker build -t test-api:latest .